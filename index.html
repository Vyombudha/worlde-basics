<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="wordle.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="popup hidden">
    <p>Game Over</p>
    </div>

    <div class="container">
        <div class="rows">

            <div class="row">
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
            </div>

            <div class="row">
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
            </div>

            <div class="row">
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
            </div>

            <div class="row">
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
            </div>

            <div class="row">
                <p></p>
                <p></p>
                <p></p>
                <p></p>
                <p></p>
            </div>

        </div>
        <div class="gameControls">
            <img src="./next_plan_26dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="next game icon"  class="nextGame"/>
            <img src="./refresh_26dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="reset Tiles icon" class="resetTiles"/>
        </div>

        <div class="keys">
            <div class="letters">
                <p>Q</p>
                <p>W</p>
                <p>E</p>
                <p>R</p>
                <p>T</p>
                <p>Y</p>
                <p>U</p>
                <p>I</p>
                <p>O</p>
                <p>P</p>
            </div>
            <div class="letters">
                <p>A</p>
                <p>S</p>
                <p>D</p>
                <p>F</p>
                <p>G</p>
                <p>H</p>
                <p>J</p>
                <p>K</p>
                <p>L</p>
            </div>
            <div class="letters">
                <p>ENTER</p>
                <p>Z</p>
                <p>X</p>
                <p>C</p>
                <p>V</p>
                <p>B</p>
                <p>N</p>
                <p>M</p>
                <p data-key="Backspace"><img src="./backspace_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" /></p>
            </div>

        </div>
    </div>
    <script src="wordle.js"></script>

</html>
